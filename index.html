<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на свадьбу — Нурдин & Чолпон-Ай</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Playfair+Display:ital@1&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Cormorant Garamond', serif;
            -webkit-font-smoothing: antialiased;
            background-color: #f4f4f2;
        }

        /* Полноэкранный фоновый контейнер */
        .main-bg {
            background-image: url('https://i.pinimg.com/736x/cf/d4/63/cfd46360bef1551aea869acebf33bcb7.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 15px;
            position: relative;
        }

        /* Элегантная матовая подложка для читаемости текста поверх фото */
        .main-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.75); /* Мягкий полупрозрачный белый вуаль */
            z-index: 1;
        }

        /* Карточка с контентом */
        .invitation-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 40px 25px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px); /* Эффект матового стекла */
            -webkit-backdrop-filter: blur(4px);
            border-radius: 2px;
        }

        .top-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #555;
            margin-bottom: 25px;
            font-weight: 400;
        }

        /* Стилизация имен (каллиграфия + строгость) */
        .names-wrapper {
            margin-bottom: 25px;
        }

        .name-calligraphy {
            font-family: 'Great Vibes', 'Snell Roundhand', 'Bickham Script Pro', 'Gabriola', cursive;
            font-size: 58px;
            line-height: 0.9;
            color: #B8975A;
            font-weight: 300;
            letter-spacing: 0px;
        }

        /* Стильный и аккуратный амперсанд в цвет имен */
        .ampersand {
            font-family: 'Great Vibes', 'Playfair Display', serif;
            font-size: 38px;
            color: #B8975A; /* Цвет изменен на точное соответствие именам */
            margin: 10px 0;
            line-height: 1;
        }

        .main-text {
            font-size: 17px;
            line-height: 1.6;
            color: #2c2c2c;
            margin-bottom: 30px;
            font-style: italic;
            font-weight: 400;
        }

        /* Разделительные линии для даты из референса */
        .date-container {
            border-top: 1px solid #9c968f;
            border-bottom: 1px solid #9c968f;
            padding: 16px 0;
            margin: 30px 0;
        }

        .date-number {
            font-size: 30px;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 400;
            color: #111;
        }

        .time-number {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #444;
            margin-top: 6px;
            font-weight: 500;
        }

        /* Информационный блок локации */
        .venue-container {
            margin-top: 25px;
        }

        .venue-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #666;
            margin-bottom: 8px;
        }

        .venue-title {
            font-size: 23px;
            font-weight: 500;
            color: #111;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .venue-address {
            font-size: 15px;
            color: #444;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* Кнопка навигации 2ГИС */
        .gis-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: none;
            border: 1px solid #2c2c2c;
            padding: 12px 26px
